<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Certificate Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            background:#F5F7FB;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

        }

        .container-box{

            width:900px;
            background:white;

            border-radius:25px;

            overflow:hidden;

            box-shadow:0 15px 40px rgba(0,0,0,.08);

            display:flex;

        }

        /* LEFT */

        .left{

            width:40%;

            background:linear-gradient(135deg,#2563EB,#1D4ED8);

            color:white;

            padding:60px 40px;

            display:flex;
            flex-direction:column;
            justify-content:center;

        }

        .left i{

            font-size:70px;
            margin-bottom:25px;

        }

        .left h2{

            font-size:34px;
            font-weight:700;

        }

        .left p{

            margin-top:20px;
            opacity:.9;
            line-height:1.7;

        }

        /* RIGHT */

        .right{

            width:60%;
            padding:45px;

        }

        .title{

            font-size:30px;
            font-weight:700;
            color:#222;

            margin-bottom:10px;

        }

        .subtitle{

            color:#777;
            margin-bottom:35px;

        }

        .form-label{

            font-weight:600;
            margin-bottom:8px;

        }

        .form-control,
        .form-select{

            height:52px;

            border-radius:12px;

            border:1px solid #d9d9d9;

            padding-left:18px;

        }

        .form-control:focus,
        .form-select:focus{

            border-color:#2563EB;

            box-shadow:0 0 10px rgba(37,99,235,.2);

        }

        .btn-custom{

            width:100%;

            height:55px;

            border:none;

            border-radius:12px;

            background:#2563EB;

            color:white;

            font-size:17px;

            font-weight:600;

            transition:.3s;

        }

        .btn-custom:hover{

            background:#1D4ED8;

            transform:translateY(-2px);

        }

        .alert{

            border-radius:12px;

        }

    </style>

</head>

<body>

<div class="container-box">

    <!-- LEFT PANEL -->

    <div class="left">

        <i class="bi bi-award-fill"></i>

        <h2>
            Certificate Generator
        </h2>

        <p>

            Generate professional certificates in seconds.

            <br><br>

            Select the certificate template, enter the student details and instantly download the PDF.

        </p>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right">

        <div class="title">

            Generate Certificate

        </div>

        <div class="subtitle">

            Fill all required information.

        </div>

        <form
                th:action="@{/generate}"
                th:object="${certificate}"
                method="post">

            <!-- Certificate -->

            <div class="mb-3">

                <label class="form-label">

                    Certificate Type

                </label>

                <select
                        class="form-select"
                        th:field="*{certificateType}">

                    <option value="DA">Data Analytics</option>

                    <option value="MERN">MERN Stack</option>

                    <option value="DSA">DSA</option>

                </select>

            </div>

            <!-- Name -->

            <div class="mb-3">

                <label class="form-label">

                    Student Name

                </label>

                <input
                        class="form-control"
                        type="text"
                        th:field="*{name}"
                        placeholder="Enter full name">

            </div>

            <!-- Duration -->

            <div class="mb-3">

                <label class="form-label">

                    Duration

                </label>

                <input
                        class="form-control"
                        type="text"
                        th:field="*{duration}"
                        placeholder="Example : 8 Weeks">

            </div>

            <!-- Dates -->

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Start Date

                    </label>

                    <input
                            class="form-control"
                            type="text"
                            th:field="*{startDate}"
                            placeholder="01 Jan 2026">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        End Date

                    </label>

                    <input
                            class="form-control"
                            type="text"
                            th:field="*{endDate}"
                            placeholder="28 Feb 2026">

                </div>

            </div>

            <br>

            <button
                    class="btn-custom"
                    type="submit">

                <i class="bi bi-file-earmark-pdf-fill"></i>

                Generate Certificate

            </button>

        </form>

        <div
                class="alert alert-success mt-4"
                th:if="${message}"
                th:text="${message}">
        </div>

    </div>

</div>

</body>
</html>
